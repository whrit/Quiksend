name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: quiksend
          POSTGRES_PASSWORD: quiksend
          POSTGRES_DB: quiksend
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quiksend -d quiksend"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://quiksend:quiksend@localhost:5432/quiksend
      NODE_ENV: test
      LOG_LEVEL: silent

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Migrate DB (tenancy tests need real schema)
        run: pnpm db:migrate

      - name: Test
        run: pnpm test

      - name: Engine load test
        run: pnpm tsx scripts/load-test-engine.ts --workspaces=2 --enrollments=20 --workers=2 --duration=30
