name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Outputs let the image job run ONLY when a release was actually cut.
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          # Default GITHUB_TOKEN is enough because the image job below is chained
          # in THIS workflow (needs + if). A tag created by GITHUB_TOKEN does not
          # trigger a separate `on: push: tags` workflow. See RELEASING.md for the
          # PAT option (needed only to run CI on the release PR).
          # token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # Build + push web and worker images to GHCR on every release. Deploy is not
  # wired yet (chosen: images-only for now) — a deploy job hangs off this later.
  release-images:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: quiksend-web
            dockerfile: apps/web/Dockerfile
          - image: quiksend-worker
            dockerfile: apps/worker/Dockerfile
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          # metadata-action lowercases the image name (GHCR requires lowercase).
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
