services:
  postgres:
    # pgvector image so the extension is available when the AI phase lands (Phase 8).
    image: pgvector/pgvector:pg17
    container_name: quiksend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quiksend
      POSTGRES_PASSWORD: quiksend
      POSTGRES_DB: quiksend
    ports:
      - "5432:5432"
    volumes:
      - quiksend-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiksend -d quiksend"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local mail sink for testing the sending layer (Phase 4). UI at http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: quiksend-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI

volumes:
  quiksend-pgdata:
